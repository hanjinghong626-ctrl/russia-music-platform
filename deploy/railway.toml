[build]
  builder = "python"
  buildCommand = "pip install -r requirements.txt"
  runCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT}"

[deploy]
  region = "us-east-1"
  runtime = "standard"

[environment]
  PORT = 8000
  PYTHON_VERSION = "3.11"

[[env]]
  name = "FEISHU_APP_ID"
  value = "your_feishu_app_id"
  sync = false

[[env]]
  name = "FEISHU_APP_SECRET"
  value = "your_feishu_app_secret"
  sync = false

